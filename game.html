<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/game.css" />
    <!-- <script type="module" src="js/use.js"></script> -->
    <script type="module" src="js/nav.js"></script>
    <script type="module" src="js/script.js"></script>

    <title>Document</title>
  </head>

  <body class="game-page">
    <noscript>
      <div
        style="
          background-color: #dc3545;
          color: white;
          padding: 20px;
          text-align: center;
          font-size: 16px;
          font-weight: bold;
        "
      >
        <p>⚠️ JavaScript is vereist voor deze website</p>
        <p>
          Schakel JavaScript in in uw browserinstellingen om de website correct
          te kunnen gebruiken.
        </p>
      </div>
    </noscript>
    <div class="game-container">
      <div id="game-header" class="game-bar" style="display: none">
        <div id="xp-display" class="xp-text">XP: 0</div>
        <div id="role-info" class="role-text"></div>
        <div id="role-progress" class="role-progress"></div>
      </div>

      <div id="initial-role-selection" class="game-bar" style="display: none">
        <div class="role-selection-header">
          <div id="initial-xp-display" class="xp-text">XP: 0</div>
          <a href="awards.html"
            ><button class="button" id="awards-button">Awards</button></a
          >
        </div>
        <div id="roles-grid" class="grid-container"></div>
      </div>

      <div id="game-content" class="game-content" style="display: none">
        <h2 id="node-name"></h2>
        <p id="node-description"></p>
        <a id="node-link" href="#" target="_blank" style="display: none"
          >Lees meer</a
        >
        <h3 id="action-text">Wat doe je?</h3>
        <div id="choices-container" class="choices"></div>
      </div>
    </div>
  </body>
</html>
